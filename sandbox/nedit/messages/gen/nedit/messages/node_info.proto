syntax = "proto3";

option optimize_for = LITE_RUNTIME;

package nil.nedit.proto;

import "type.proto";

message NodeInfo {
    message ControlInfo
    {
        message SliderControlInfo
        {
            float min = 1;
            float max = 2;
            float value = 3;
        }

        message TextControlInfo
        {
            string value = 1;
        }

        oneof control {
            SliderControlInfo slider = 2;
            TextControlInfo text = 3;
        }
    }

    repeated uint64 inputs = 1;
    repeated uint64 outputs = 2;
    repeated ControlInfo controls = 3;
    string label = 4;
}
